<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lanchão Caraguá - Checkout Transparente</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://sdk.mercadopago.com/js/v2"></script>
  <style>
    /* ... Seus estilos CSS permanecem os mesmos ... */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { background: #fefaf5; padding: 20px; }
    .container { max-width: 1200px; margin: auto; display: flex; flex-wrap: wrap; gap: 2rem; }
    .checkout { flex: 1.5; background: white; border-radius: 28px; padding: 1.5rem; box-shadow: 0 12px 28px rgba(0,0,0,0.08); }
    .produto { background: white; border-radius: 20px; padding: 1rem; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; border: 1px solid #ffe0cc; }
    button { background: #d13f1f; color: white; border: none; padding: 12px; border-radius: 40px; cursor: pointer; font-weight: 600; }
    .pagamento-tabs { display: flex; gap: 10px; margin: 1rem 0; }
    .tab { flex: 1; text-align: center; padding: 10px; background: #f0dbcf; border-radius: 40px; cursor: pointer; }
    .tab.active { background: #d13f1f; color: white; }
    input, select { width: 100%; padding: 10px; margin: 8px 0; border-radius: 12px; border: 1.5px solid #eee; }
  </style>
</head>
<body>
<div class="container">
  <div class="cardapio">
    <h2>🍔 Cardápio</h2>
    <div id="produtos"></div>
  </div>

  <div class="checkout">
    <h2>🛒 Seu Pedido</h2>
    <div id="carrinho"></div>
    <div id="total" style="font-weight: bold; margin: 1rem 0;"></div>
    
    <input type="text" id="nome" placeholder="Nome Completo">
    <input type="email" id="email" placeholder="E-mail">
    <input type="text" id="endereco" placeholder="Endereço de Entrega">

    <div class="pagamento-tabs">
      <div class="tab active" data-method="pix">Pix</div>
      <div class="tab" data-method="card">Cartão</div>
    </div>

    <div id="pix-area">
      <div id="qr-code-container" style="text-align:center;"></div>
      <input type="text" id="pix-copia-cola" readonly placeholder="Código Pix">
    </div>

    <div id="card-area" style="display:none;">
      <select id="paymentMethodId">
        <option value="visa">Visa</option>
        <option value="master">Mastercard</option>
      </select>
      <input type="text" id="cardNumber" placeholder="Número do Cartão">
      <div style="display: flex; gap: 10px;">
        <input type="text" id="expMonth" placeholder="MM">
        <input type="text" id="expYear" placeholder="AAAA">
        <input type="text" id="cvv" placeholder="CVV">
      </div>
      <input type="text" id="cardholderName" placeholder="Nome no Cartão">
      <input type="text" id="docNumber" placeholder="CPF">
    </div>

    <button id="pagarBtn" style="width:100%; margin-top:1rem;">Finalizar Pagamento</button>
    <div id="status"></div>
  </div>
</div>

<script>
  const mp = new MercadoPago('SUA_PUBLIC_KEY_AQUI'); // COLOQUE SUA KEY AQUI
  let carrinho = [{ id: 1, nome: "Pedido Lanchão", preco: 50.00, qtd: 1 }]; // Exemplo
  let metodo = 'pix';

  // Lógica das abas
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      metodo = tab.dataset.method;
      document.getElementById('pix-area').style.display = metodo === 'pix' ? 'block' : 'none';
      document.getElementById('card-area').style.display = metodo === 'card' ? 'block' : 'none';
    });
  });

  async function processarPagamento() {
    const statusDiv = document.getElementById('status');
    const total = 50.00; // Calcule do seu carrinho real

    try {
      statusDiv.innerText = "Processando...";
      let payload = {
        type: metodo,
        amount: total,
        description: "Pedido Lanchão",
        payer: { email: document.getElementById('email').value }
      };

      if (metodo === 'card') {
        const tokenResponse = await mp.fields.create('cardToken', {
          cardNumber: document.getElementById('cardNumber').value,
          expirationMonth: document.getElementById('expMonth').value,
          expirationYear: document.getElementById('expYear').value,
          securityCode: document.getElementById('cvv').value,
          cardholderName: document.getElementById('cardholderName').value,
          identification: { type: 'CPF', number: document.getElementById('docNumber').value }
        });
        
        payload.token = tokenResponse.id;
        payload.paymentMethodId = document.getElementById('paymentMethodId').value;
        payload.installments = 1;
        payload.payer.identification = { type: 'CPF', number: document.getElementById('docNumber').value };
      }

      // CHAMADA PARA A FUNÇÃO DO NETLIFY
      const response = await fetch('/.netlify/functions/create-payment', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      const data = await response.json();

      if (metodo === 'pix' && data.qr_code) {
        document.getElementById('qr-code-container').innerHTML = `<img src="data:image/png;base64,${data.qr_code_base64}" width="200">`;
        document.getElementById('pix-copia-cola').value = data.qr_code;
        statusDiv.innerText = "Escaneie o QR Code!";
      } else if (data.status === 'approved') {
        statusDiv.innerText = "✅ Pago com sucesso!";
      } else {
        statusDiv.innerText = "Erro: " + (data.status_detail || "Falha no pagamento");
      }

    } catch (err) {
      statusDiv.innerText = "Erro no sistema.";
      console.error(err);
    }
  }

  document.getElementById('pagarBtn').addEventListener('click', processarPagamento);
</script>
</body>
</html>
